name: Publish AUR

on:
  workflow_dispatch:
    inputs:
      package:
        description: AUR package to publish
        required: true
        default: both
        type: choice
        options:
          - both
          - vesselix-bin
          - vesselix-git
      release:
        description: GitHub release tag/version for vesselix-bin, for example v0.1.1
        required: true
        default: v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - pkgname: vesselix-bin
            pkgbuild: packaging/aur/vesselix-bin/PKGBUILD
            assets: packaging/aur/vesselix-bin/vesselix.service
          - pkgname: vesselix-git
            pkgbuild: packaging/aur/vesselix-git/PKGBUILD
            assets: packaging/aur/vesselix-git/vesselix.service
    steps:
      - uses: actions/checkout@v4

      - name: Update vesselix-bin release metadata
        if: (github.event.inputs.package == 'both' || github.event.inputs.package == matrix.pkgname) && matrix.pkgname == 'vesselix-bin'
        run: ./scripts/update-aur-bin.sh "${{ github.event.inputs.release }}"

      - name: Publish ${{ matrix.pkgname }} to AUR
        if: github.event.inputs.package == 'both' || github.event.inputs.package == matrix.pkgname
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: ${{ matrix.pkgbuild }}
          assets: ${{ matrix.assets }}
          commit_username: mavxa
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "update: ${{ github.sha }}"
